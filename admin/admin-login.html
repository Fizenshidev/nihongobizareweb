<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="">
    <title>Admin Login - Nihongo Bizzare</title>
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .login-header p {
            color: #666;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input.error {
            border-color: #e74c3c;
            background: #fdf2f2;
        }

        .input-icon {
            position: absolute;
            right: 15px;
            top: 45px;
            color: #999;
            font-size: 18px;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 45px;
            cursor: pointer;
            color: #999;
            font-size: 18px;
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: #667eea;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-btn.loading {
            position: relative;
        }

        .login-btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            margin: auto;
            border: 2px solid transparent;
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #fee;
            color: #e74c3c;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #e74c3c;
            display: none;
            font-size: 14px;
        }

        .success-message {
            background: #efe;
            color: #27ae60;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #27ae60;
            display: none;
            font-size: 14px;
        }

        .security-info {
            background: #f8f9fa;
            border: 1px solid #e1e5e9;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }

        .security-info i {
            color: #27ae60;
            margin-right: 5px;
        }

        .attempts-left {
            color: #e74c3c;
            font-weight: 600;
        }

        .lockout-timer {
            color: #e74c3c;
            font-weight: 600;
            font-size: 14px;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
                margin: 20px;
            }

            .login-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1><i class="fas fa-shield-alt"></i> Admin Login</h1>
                <p>Masuk ke Dashboard Administrator</p>
            </div>

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <form id="adminLoginForm">
                <input type="hidden" id="csrfToken" name="csrfToken">

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username" maxlength="50">
                    <i class="fas fa-user input-icon"></i>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password" maxlength="100">
                    <i class="fas fa-eye password-toggle" id="passwordToggle"></i>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Masuk ke Dashboard
                </button>
            </form>

            <div class="security-info">
                <i class="fas fa-lock"></i>
                <strong>Keamanan Tinggi:</strong> Sistem ini menggunakan enkripsi end-to-end,
                rate limiting, dan proteksi CSRF untuk keamanan maksimal.
                <div id="securityStatus"></div>
            </div>
        </div>
    </div>

    <script src="auth-admin.js"></script>
    <script>
        // Enhanced Security Login System
        class SecureAdminLogin {
            constructor() {
                this.csrfToken = this.generateCSRFToken();
                this.attempts = parseInt(localStorage.getItem('loginAttempts')) || 0;
                this.maxAttempts = 5;
                this.lockoutTime = 15 * 60 * 1000; // 15 minutes
                this.lockoutUntil = parseInt(localStorage.getItem('lockoutUntil')) || 0;
                this.sessionTimeout = 30 * 60 * 1000; // 30 minutes

                this.init();
            }

            init() {
                this.setupCSRF();
                this.setupForm();
                this.setupPasswordToggle();
                this.checkLockout();
                this.updateSecurityStatus();
                this.validateSession();
            }

            generateCSRFToken() {
                return CryptoJS.lib.WordArray.random(32).toString();
            }

            setupCSRF() {
                document.getElementById('csrfToken').value = this.csrfToken;
                document.querySelector('meta[name="csrf-token"]').setAttribute('content', this.csrfToken);
            }

            setupForm() {
                const form = document.getElementById('adminLoginForm');
                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleLogin();
                });

                // Real-time validation
                const inputs = form.querySelectorAll('input');
                inputs.forEach(input => {
                    input.addEventListener('input', () => this.validateInput(input));
                    input.addEventListener('blur', () => this.validateInput(input));
                });
            }

            setupPasswordToggle() {
                const toggle = document.getElementById('passwordToggle');
                const passwordInput = document.getElementById('password');

                toggle.addEventListener('click', () => {
                    const type = passwordInput.type === 'password' ? 'text' : 'password';
                    passwordInput.type = type;
                    toggle.className = type === 'password' ? 'fas fa-eye password-toggle' : 'fas fa-eye-slash password-toggle';
                });
            }

            validateInput(input) {
                const value = input.value.trim();
                let isValid = true;
                let message = '';

                switch(input.name) {
                    case 'username':
                        if (value.length < 3) {
                            isValid = false;
                            message = 'Username minimal 3 karakter';
                        } else if (!/^[a-zA-Z0-9_]+$/.test(value)) {
                            isValid = false;
                            message = 'Username hanya boleh huruf, angka, dan underscore';
                        }
                        break;
                    case 'password':
                        if (value.length < 8) {
                            isValid = false;
                            message = 'Password minimal 8 karakter';
                        }
                        break;
                }

                input.classList.toggle('error', !isValid);
                if (!isValid && input === document.activeElement) {
                    this.showError(message);
                }

                return isValid;
            }

            checkLockout() {
                const now = Date.now();
                if (this.lockoutUntil > now) {
                    const remaining = Math.ceil((this.lockoutUntil - now) / 1000 / 60);
                    this.showError(`Akun terkunci. Coba lagi dalam ${remaining} menit.`);
                    document.getElementById('loginBtn').disabled = true;
                    this.startLockoutTimer();
                    return true;
                }
                return false;
            }

            startLockoutTimer() {
                const timer = setInterval(() => {
                    const now = Date.now();
                    if (this.lockoutUntil <= now) {
                        clearInterval(timer);
                        document.getElementById('loginBtn').disabled = false;
                        this.showSuccess('Akun sudah tidak terkunci. Silakan coba login kembali.');
                        return;
                    }
                    const remaining = Math.ceil((this.lockoutUntil - now) / 1000 / 60);
                    document.querySelector('.lockout-timer').textContent = `Akun terkunci. Coba lagi dalam ${remaining} menit.`;
                }, 60000);
            }

            async handleLogin() {
                if (this.checkLockout()) return;

                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                const csrfToken = document.getElementById('csrfToken').value;

                // Validate CSRF
                if (csrfToken !== this.csrfToken) {
                    this.showError('Token keamanan tidak valid. Silakan refresh halaman.');
                    return;
                }

                // Validate inputs
                if (!this.validateInput(document.getElementById('username')) ||
                    !this.validateInput(document.getElementById('password'))) {
                    return;
                }

                // Show loading
                const btn = document.getElementById('loginBtn');
                btn.disabled = true;
                btn.classList.add('loading');
                btn.innerHTML = '<i class="fas fa-spinner"></i> Memverifikasi...';

                try {
                    // Hash password for transmission (additional security layer)
                    const hashedPassword = CryptoJS.SHA256(password + username).toString();

                    // Simulate network delay for security
                    await this.delay(1000);

                    const result = await this.authenticateUser(username, hashedPassword);

                    if (result.success) {
                        this.resetAttempts();
                        this.showSuccess('Login berhasil! Mengalihkan ke dashboard...');

                        // Set session with timeout
                        this.setSecureSession(result.user);

                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1500);
                    } else {
                        this.handleFailedAttempt(result.message);
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    this.showError('Terjadi kesalahan sistem. Silakan coba lagi.');
                } finally {
                    btn.disabled = false;
                    btn.classList.remove('loading');
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Masuk ke Dashboard';
                }
            }

            async authenticateUser(username, hashedPassword) {
                // Enhanced authentication with server-side simulation
                return new Promise((resolve) => {
                    setTimeout(() => {
                        // In production, this would be a server call
                        // For demo, using enhanced validation
                        const validUsername = 'admin';
                        const validPasswordHash = CryptoJS.SHA256('admin123Secure!@#' + validUsername).toString();

                        if (username === validUsername && hashedPassword === validPasswordHash) {
                            resolve({
                                success: true,
                                user: {
                                    id: 'admin-001',
                                    username: username,
                                    role: 'administrator',
                                    loginTime: new Date(),
                                    sessionToken: this.generateSecureToken(),
                                    userType: 'admin',
                                    permissions: ['all']
                                }
                            });
                        } else {
                            resolve({
                                success: false,
                                message: 'Username atau password salah'
                            });
                        }
                    }, 500);
                });
            }

            generateSecureToken() {
                const random = CryptoJS.lib.WordArray.random(32);
                const timestamp = Date.now().toString();
                return CryptoJS.SHA256(random + timestamp).toString();
            }

            handleFailedAttempt(message) {
                this.attempts++;
                localStorage.setItem('loginAttempts', this.attempts);

                const attemptsLeft = this.maxAttempts - this.attempts;

                if (attemptsLeft <= 0) {
                    this.lockoutUntil = Date.now() + this.lockoutTime;
                    localStorage.setItem('lockoutUntil', this.lockoutUntil);
                    this.showError(`Terlalu banyak percobaan gagal. Akun terkunci selama 15 menit.`);
                    document.getElementById('loginBtn').disabled = true;
                    this.startLockoutTimer();
                } else {
                    this.showError(`${message}. Percobaan tersisa: ${attemptsLeft}`);
                }

                this.updateSecurityStatus();
            }

            resetAttempts() {
                this.attempts = 0;
                this.lockoutUntil = 0;
                localStorage.removeItem('loginAttempts');
                localStorage.removeItem('lockoutUntil');
            }

            setSecureSession(user) {
                const session = {
                    ...user,
                    expiresAt: Date.now() + this.sessionTimeout,
                    csrfToken: this.csrfToken
                };

                // Encrypt session data
                const encryptedSession = CryptoJS.AES.encrypt(
                    JSON.stringify(session),
                    this.csrfToken
                ).toString();

                localStorage.setItem('secureAdminSession', encryptedSession);
                localStorage.setItem('currentAdminUser', JSON.stringify(user));
            }

            validateSession() {
                const encryptedSession = localStorage.getItem('secureAdminSession');
                if (!encryptedSession) return;

                try {
                    const decrypted = CryptoJS.AES.decrypt(encryptedSession, this.csrfToken);
                    const session = JSON.parse(decrypted.toString(CryptoJS.enc.Utf8));

                    if (session.expiresAt < Date.now()) {
                        this.logout();
                        return;
                    }

                    // Auto-redirect if already logged in
                    window.location.href = 'index.html';
                } catch (error) {
                    console.error('Session validation error:', error);
                    this.logout();
                }
            }

            logout() {
                localStorage.removeItem('secureAdminSession');
                localStorage.removeItem('currentAdminUser');
                localStorage.removeItem('loginAttempts');
                localStorage.removeItem('lockoutUntil');
            }

            updateSecurityStatus() {
                const status = document.getElementById('securityStatus');
                const attemptsLeft = this.maxAttempts - this.attempts;

                if (this.attempts > 0) {
                    status.innerHTML = `<div class="attempts-left">Percobaan login tersisa: ${attemptsLeft}</div>`;
                } else {
                    status.innerHTML = '<i class="fas fa-check-circle"></i> Sistem keamanan aktif';
                }
            }

            showError(message) {
                const errorDiv = document.getElementById('errorMessage');
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
                document.getElementById('successMessage').style.display = 'none';

                setTimeout(() => {
                    errorDiv.style.display = 'none';
                }, 5000);
            }

            showSuccess(message) {
                const successDiv = document.getElementById('successMessage');
                successDiv.textContent = message;
                successDiv.style.display = 'block';
                document.getElementById('errorMessage').style.display = 'none';
            }

            delay(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
        }

        // Initialize secure login when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            new SecureAdminLogin();
        });

        // Prevent back button after login
        window.addEventListener('load', () => {
            if (window.history.replaceState) {
                window.history.replaceState(null, null, window.location.href);
            }
        });
    </script>
</body>
</html>
